<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="60%" stop-color="#0f0728" />
      <stop offset="100%" stop-color="#02000a" />
    </radialGradient>
    
    <!-- Golden Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Teal/Cyan Neon Gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Smooth Drop Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#f59e0b" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Base Circular App Icon Frame with elegant gold border -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8" />

  <!-- Abstract decorative rings representing continuous learning quests -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#312e81" stroke-width="2" stroke-dasharray="10 15" opacity="0.6" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.4" />

  <g filter="url(#glow)">
    <!-- Central Crest / Book Outline -->
    <path d="M120 340 L230 380 C245 385, 267 385, 282 380 L392 340 C405 335, 412 320, 412 300 L412 160 C412 145, 400 135, 385 140 L270 180 C260 183, 252 183, 242 180 L127 140 C112 135, 100 145, 100 160 L100 300 C100 320, 107 335, 120 340 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Dividing Book Page Center Spine -->
    <line x1="256" y1="184" x2="256" y2="380" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Left Hand: Devandgari Letter 'अ' representing Hindi -->
    <!-- Elegantly styled vector paths representing Devanagari 'अ' with clear, balanced proportions -->
    <path d="M140 200 H215 M180 200 V300 M140 230 C175 220, 205 240, 180 260 C215 270, 200 310, 155 300" 
          fill="none" stroke="url(#tealGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

    <!-- Right Hand: Telugu Letter 'అ' representing Telugu -->
    <!-- Beautifully curved Telugu character path -->
    <path d="M295 240 C285 210, 315 190, 335 210 C365 195, 385 225, 370 245 C355 265, 315 265, 305 290 C295 315, 330 330, 350 320 C370 310, 380 285, 380 285" 
          fill="none" stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Decorative crown/star on top -->
    <polygon points="256,115 262,128 276,128 265,138 269,152 256,143 243,152 247,138 236,128 250,128" fill="url(#goldGrad)" />
  </g>
</svg>
